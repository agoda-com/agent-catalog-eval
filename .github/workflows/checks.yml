name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: setup
        uses: ./.actions/setup
        with:
          cache-key: ci-build
      - name: build
        run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: setup
        uses: ./.actions/setup
        with:
          cache-key: ci-test
      - name: test
        run: pnpm test

  check-types:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: setup
        uses: ./.actions/setup
        with:
          cache-key: ci-types
      - name: check-types
        run: pnpm check-types

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: setup
        uses: ./.actions/setup
        with:
          cache-key: ci-lint
      - name: lint
        run: pnpm lint
